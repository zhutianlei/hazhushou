name: "HaAssistant"
version: "1.0.0"
slug: ha-assistant
description: >-
  局域网终端与 Home Assistant 安全对接系统。服务端集中管控，客户端零信任。
arch:
  - amd64
url: "https://github.com/zhutianlei/hazhushou"
image: "ghcr.io/zhutianlei/hazhushou-{arch}"
startup: services
ingress: true
ingress_port: 8765
webui: "http://[HOST]:[PORT:8765]/"
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: "Web 管理面板"
panel_icon: "mdi:monitor-dashboard"
panel_title: "HaAssistant"
panel_admin: true
boot: auto
init: false
host_network: true
map:
  - type: data
    read_only: false
options:
  ha_base_url: "http://homeassistant.local:8123"
  ha_username: ""
  ha_password: ""
  token_auto_refresh: false
  token_refresh_hour: 3
  port: 8765
schema:
  ha_base_url: str
  ha_username: str
  ha_password: password
  token_auto_refresh: bool
  token_refresh_hour: int(0,23)
  port: int
