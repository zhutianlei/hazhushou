name: "HA助手"
version: "1.1.0"
slug: ha-assistant
description: >-
  网吧终端安全对接Home Assistant，实现智能化操作。
arch:
  - amd64
url: "https://github.com/zhutianlei/hazhushou"
image: "ghcr.io/zhutianlei/hazhushou-{arch}"
startup: services
ingress: true
ingress_port: 8765
panel_icon: "mdi:monitor-dashboard"
panel_title: "HA助手"
panel_admin: true
boot: auto
init: false
host_network: false
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: "终端 API 端口"
map:
  - type: data
    read_only: false
options:
  ha_base_url: "http://homeassistant.local:8123"
  ha_username: ""
  ha_password: ""
  token_refresh_time: ""
  port: 8765
schema:
  ha_base_url: str
  ha_username: str
  ha_password: password
  token_refresh_time: str
  port: int
